<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Radio Player - Easy Web TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Zhang Boheng">
    <meta name="keywords" content="iptv, movie, github, online tv, web tv, series tv, radio, music">
    <link href="https://vjs.zencdn.net/7.14.3/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="../css/main.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/ie8/1.1.2/videojs-ie8.min.js"></script>
    <script src="../js/jquery-3.6.0.min.js"></script>
    <style>
        /* Reset main.css conflicts */
        .player-container,
        .player-container * {
            float: none !important;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background-image: url("../images/bg.jpg");
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        /* Main Container */
        .player-container {
            width: 100%;
            height: 100vh;
            display: flex;
            position: relative;
        }
        
        /* Sidebar - Station List */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            border-right: 2px solid rgba(163,0,27,0.5);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
            z-index: 100;
        }
        
        .sidebar.collapsed {
            width: 0;
            border-right: none;
        }
        
        .sidebar-content {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .sidebar.collapsed .sidebar-content {
            opacity: 0;
            visibility: hidden;
        }
        
        /* Sidebar Header */
        .sidebar-header {
            padding: 15px 20px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .sidebar-header h3 {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            padding: 0;
        }
        
        .sidebar-header h3 i {
            color: #a3001b;
        }
        
        .sidebar-header .station-count {
            background: rgba(163,0,27,0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #a3001b;
        }
        
        /* Sidebar Search */
        .sidebar-search {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        
        .sidebar-search input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            border: 2px solid rgba(163,0,27,0.3);
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .sidebar-search input:focus {
            border-color: #a3001b;
            background: rgba(255,255,255,0.15);
        }
        
        .sidebar-search input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .sidebar-search i {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        /* Station List */
        .station-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .station-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .station-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        .station-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #a3001b 0%, #8a0016 100%);
            border-radius: 3px;
        }
        
        .station-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .station-item:hover {
            background: rgba(163,0,27,0.15);
            border-bottom-color: rgba(163,0,27,0.3);
        }
        
        .station-item.active {
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom-color: #a3001b;
        }
        
        .station-item .station-icon {
            width: 32px;
            height: 32px;
            background: rgba(163,0,27,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .station-item .station-icon i {
            color: #a3001b;
            font-size: 14px;
        }
        
        .station-item .station-name {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        
        .station-item:hover .station-name {
            color: #a3001b;
        }
        
        .station-item .favorite-btn {
            opacity: 0;
            transition: opacity 0.2s ease;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        .station-item:hover .favorite-btn {
            opacity: 1;
        }
        
        .station-item .favorite-btn.active {
            opacity: 1;
            color: #a3001b;
        }
        
        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.5);
            padding: 30px;
        }
        
        .loading-state i {
            font-size: 32px;
            color: #a3001b;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Main Content - Audio Player */
        .main-content {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* Top Toolbar */
        .top-toolbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            z-index: 50;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        /* Top toolbar hidden state - use display */
        .top-toolbar.hidden {
            display: none;
        }
        
        /* Hide menuBtn when sidebar is collapsed */
        .sidebar.collapsed ~ .main-content .toolbar-left #menuBtn {
            display: none;
        }
        
        /* When toolbar is hidden, audio container fills the space */
        .top-toolbar.hidden ~ .audio-container {
            padding-top: 40px;
        }
        
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .toolbar-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .toolbar-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.05);
        }
        
        .toolbar-btn i {
            color: #a3001b;
            font-size: 16px;
            transition: color 0.3s ease;
        }
        
        .toolbar-btn:hover i {
            color: #fff;
        }
        
        .toolbar-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toolbar-title i {
            color: #a3001b;
        }
        
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Link Input */
        .link-input-wrapper {
            position: relative;
            display: none;
        }
        
        .link-input-wrapper.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .link-input {
            width: 300px;
            padding: 10px 15px;
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 10px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .link-input:focus {
            border-color: #a3001b;
            background: rgba(0,0,0,0.9);
        }
        
        .link-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .play-link-btn {
            padding: 10px 15px;
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .play-link-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(163,0,27,0.4);
        }
        
        /* Audio Player Container */
        .audio-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px 40px;
            position: relative;
        }
        
        /* Radio Visualizer Animation */
        .radio-visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
            height: 100px;
        }
        
        .radio-visualizer .bar {
            width: 8px;
            background: linear-gradient(180deg, #a3001b 0%, #8a0016 100%);
            border-radius: 4px;
            animation: visualize 1s ease-in-out infinite;
        }
        
        .radio-visualizer .bar:nth-child(1) { height: 20px; animation-delay: 0s; }
        .radio-visualizer .bar:nth-child(2) { height: 40px; animation-delay: 0.1s; }
        .radio-visualizer .bar:nth-child(3) { height: 60px; animation-delay: 0.2s; }
        .radio-visualizer .bar:nth-child(4) { height: 80px; animation-delay: 0.3s; }
        .radio-visualizer .bar:nth-child(5) { height: 100px; animation-delay: 0.4s; }
        .radio-visualizer .bar:nth-child(6) { height: 80px; animation-delay: 0.5s; }
        .radio-visualizer .bar:nth-child(7) { height: 60px; animation-delay: 0.6s; }
        .radio-visualizer .bar:nth-child(8) { height: 40px; animation-delay: 0.7s; }
        .radio-visualizer .bar:nth-child(9) { height: 20px; animation-delay: 0.8s; }
        
        @keyframes visualize {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.5); }
        }
        
        .radio-visualizer.paused .bar {
            animation-play-state: paused;
        }
        
        /* Station Info */
        .station-info {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .station-info .station-title {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .station-info .station-country {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .station-info .station-country i {
            color: #a3001b;
        }
        
        /* Video Wrapper (hidden, for audio playback) */
        .video-wrapper {
            width: 100%;
            max-width: 800px;
            position: relative;
        }
        
        #video1 {
            width: 100%;
            height: auto;
        }
        
        /* Video.js Custom Styles for Audio */
        .video-js.audio-player {
            width: 100%;
            height: 60px;
        }
        
        .video-js.audio-player .vjs-big-play-button {
            display: none;
        }
        
        .video-js.audio-player .vjs-control-bar {
            background: rgba(0,0,0,0.8);
            border-radius: 30px;
            padding: 0 20px;
            height: 60px;
        }
        
        .video-js.audio-player .vjs-play-progress {
            background: #a3001b;
        }
        
        .video-js.audio-player .vjs-slider {
            background: rgba(255,255,255,0.2);
        }
        
        .video-js.audio-player .vjs-load-progress {
            background: rgba(163,0,27,0.3);
        }
        
        /* Right Side Action Buttons */
        .action-buttons {
            position: absolute;
            right: 20px;
            top: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 50;
        }
        
        .action-btn {
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background: linear-gradient(135deg, #a3001b 0%, #8a0016 100%);
            border-color: #a3001b;
            transform: scale(1.1);
        }
        
        .action-btn i {
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            transition: color 0.3s ease;
        }
        
        .action-btn:hover i {
            color: #fff;
        }
        
        /* Favorite Panel */
        .favorite-panel {
            position: absolute;
            right: 80px;
            top: 80px;
            width: 250px;
            max-height: 400px;
            background: rgba(0,0,0,0.9);
            border: 2px solid rgba(163,0,27,0.5);
            border-radius: 15px;
            display: none;
            z-index: 60;
            overflow: hidden;
        }
        
        .favorite-panel.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .favorite-panel-header {
            padding: 15px;
            background: linear-gradient(90deg, rgba(163,0,27,0.3) 0%, rgba(163,0,27,0.1) 100%);
            border-bottom: 1px solid rgba(163,0,27,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .favorite-panel-header h4 {
            color: #fff;
            font-size: 14px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .favorite-panel-header h4 i {
            color: #a3001b;
        }
        
        .favorite-panel-content {
            max-height: 350px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .favorite-panel-content::-webkit-scrollbar {
            width: 4px;
        }
        
        .favorite-panel-content::-webkit-scrollbar-thumb {
            background: #a3001b;
            border-radius: 2px;
        }
        
        .favorite-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        
        .favorite-item:hover {
            background: rgba(163,0,27,0.2);
        }
        
        .favorite-item i.fa-heart {
            color: #a3001b;
            font-size: 14px;
        }
        
        .favorite-item span {
            color: #fff;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        
        .favorite-item .delete-btn {
            opacity: 0;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            transition: opacity 0.2s ease, color 0.2s ease;
            cursor: pointer;
        }
        
        .favorite-item:hover .delete-btn {
            opacity: 1;
        }
        
        .favorite-item .delete-btn:hover {
            color: #ff4444;
        }
        
        /* Toggle Sidebar Button */
        .toggle-sidebar {
            position: absolute;
            left: 280px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 60px;
            background: rgba(0,0,0,0.8);
            border: 2px solid rgba(163,0,27,0.5);
            border-left: none;
            border-radius: 0 10px 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 101;
        }
        
        .toggle-sidebar:hover {
            background: rgba(163,0,27,0.3);
        }
        
        .toggle-sidebar i {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        
        .sidebar.collapsed .toggle-sidebar {
            left: 0;
        }
        
        .sidebar.collapsed .toggle-sidebar i {
            transform: rotate(180deg);
        }
        
        /* No Stations Message */
        .no-stations {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.5);
            padding: 30px;
            text-align: center;
        }
        
        .no-stations i {
            font-size: 48px;
            color: rgba(163,0,27,0.3);
            margin-bottom: 20px;
        }
        
        /* Responsive Design */
        @media screen and (max-width: 1024px) {
            .sidebar {
                width: 220px;
            }
            
            .toggle-sidebar {
                left: 220px;
            }
            
            .link-input {
                width: 200px;
            }
            
            .favorite-panel {
                width: 200px;
            }
            
            .radio-visualizer {
                height: 80px;
            }
            
            .radio-visualizer .bar:nth-child(5) { height: 80px; }
        }
        
        @media screen and (max-width: 768px) {
            .sidebar {
                width: 0;
                border-right: none;
            }
            
            .sidebar.show-mobile {
                width: 250px;
                border-right: 2px solid rgba(163,0,27,0.5);
                position: absolute;
                z-index: 200;
            }
            
            .toggle-sidebar {
                left: 0;
            }
            
            .sidebar.show-mobile .toggle-sidebar {
                left: 250px;
            }
            
            .sidebar.collapsed .sidebar-content,
            .sidebar.show-mobile .sidebar-content {
                opacity: 1;
                visibility: visible;
            }
            
            .toolbar-title {
                font-size: 14px;
            }
            
            .link-input {
                width: 150px;
                font-size: 12px;
            }
            
            .action-buttons {
                right: 10px;
                top: 70px;
            }
            
            .action-btn {
                width: 35px;
                height: 35px;
            }
            
            .action-btn i {
                font-size: 14px;
            }
            
            .favorite-panel {
                right: 50px;
                width: 180px;
            }
            
            .audio-container {
                padding: 70px 20px 20px;
            }
            
            .radio-visualizer {
                height: 60px;
                margin-bottom: 20px;
            }
            
            .radio-visualizer .bar {
                width: 6px;
            }
            
            .station-info .station-title {
                font-size: 18px;
            }
        }
        
        @media screen and (max-width: 480px) {
            .toolbar-btn {
                width: 35px;
                height: 35px;
            }
            
            .toolbar-btn i {
                font-size: 14px;
            }
            
            .link-input-wrapper.show {
                position: absolute;
                top: 60px;
                left: 10px;
                right: 10px;
                background: rgba(0,0,0,0.9);
                padding: 10px;
                border-radius: 10px;
            }
            
            .link-input-wrapper.show .link-input {
                width: 100%;
            }
            
            .radio-visualizer {
                height: 40px;
            }
            
            .radio-visualizer .bar {
                width: 4px;
            }
        }
        
        /* Hide old elements */
        #left, #right, #div1, #control, #menuicon, #player, #prev, #github, #favorite, #channelist, #shuffleplay, #inputlink, .toggle {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="player-container">
        <!-- Sidebar - Station List -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <!-- Sidebar Header -->
                <div class="sidebar-header">
                    <h3>
                        <i class="fas fa-broadcast-tower"></i>
                        <span id="categoryTitle">Stations</span>
                        <span class="station-count" id="stationCount">0</span>
                    </h3>
                </div>
                
                <!-- Sidebar Search -->
                <div class="sidebar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="stationSearch" placeholder="Search stations...">
                </div>
                
                <!-- Station List -->
                <div class="station-list" id="stationList">
                    <div class="loading-state">
                        <i class="fas fa-spinner"></i>
                        <span>Loading stations...</span>
                    </div>
                </div>
            </div>
            
            <!-- Toggle Button -->
            <div class="toggle-sidebar" id="toggleSidebar">
                <i class="fas fa-chevron-left"></i>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Toolbar -->
            <div class="top-toolbar" id="top-toolbar">
                <div class="toolbar-left">
                    <div class="toolbar-btn" id="backBtn" title="Back">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                    <div class="toolbar-btn" id="menuBtn" title="Toggle Menu">
                        <i class="fas fa-bars"></i>
                    </div>
                    <div class="toolbar-title">
                        <i class="fas fa-radio"></i>
                        <span id="currentStation">Select a station</span>
                    </div>
                </div>
                
                <div class="toolbar-right">
                    <div class="toolbar-btn" id="linkBtn" title="Play Audio Link">
                        <i class="fas fa-link"></i>
                    </div>
                    <div class="link-input-wrapper" id="linkInputWrapper">
                        <input type="text" class="link-input" id="linkInput" placeholder="Enter audio URL...">
                        <button class="play-link-btn" id="playLinkBtn">Play</button>
                    </div>
                </div>
            </div>
            
            <!-- Audio Player Container -->
            <div class="audio-container">
                <!-- Radio Visualizer -->
                <div class="radio-visualizer paused" id="radioVisualizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                
                <!-- Station Info -->
                <div class="station-info">
                    <div class="station-title" id="stationTitle">No Station Selected</div>
                    <div class="station-country" id="stationCountry">
                        <i class="fas fa-globe"></i>
                        <span>Select a station to start listening</span>
                    </div>
                </div>
                
                <!-- Video Wrapper (for audio playback) -->
                <div class="video-wrapper">
                    <video id="video1" class="video-js vjs-big-play-centered audio-player" controls preload="auto" autoplay="true" data-setup='{}'>
                        <source src="https://16963.live.streamtheworld.com/SAM03AAC226_SC?__80sradio__" type="audio/mp3" />
                        <p class="vjs-no-js">
                            To listen to this radio please enable JavaScript, and consider upgrading to a web browser that
                            <a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 audio</a>
                        </p>
                    </video>
                </div>
            </div>
            
            <!-- Right Side Action Buttons -->
            <div class="action-buttons">
                <div class="action-btn" id="shuffleBtn" title="Random Play">
                    <i class="fas fa-random"></i>
                </div>
                <div class="action-btn" id="favoriteBtn" title="Favorites">
                    <i class="fas fa-heart"></i>
                </div>
                <div class="action-btn" id="githubBtn" title="GitHub">
                    <i class="fab fa-github"></i>
                </div>
            </div>
            
            <!-- Favorite Panel -->
            <div class="favorite-panel" id="favoritePanel">
                <div class="favorite-panel-header">
                    <h4>
                        <i class="fas fa-heart"></i>
                        Favorites
                    </h4>
                    <span style="color: rgba(255,255,255,0.5); font-size: 12px;" id="favCount">0</span>
                </div>
                <div class="favorite-panel-content" id="favoriteContent">
                    <div class="no-stations" style="padding: 20px;">
                        <i class="fas fa-heart-broken" style="font-size: 24px;"></i>
                        <span style="font-size: 12px;">No favorites yet</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://vjs.zencdn.net/7.14.3/video.min.js"></script>
    <script>
        // Radio Browser API source
        var radiosource = ['https://de1.api.radio-browser.info/'];
        var rand = Math.floor(Math.random() * radiosource.length);
        var stations = [];
        var player;
        
        $(document).ready(function() {
            // Initialize video.js player
            player = videojs('video1');
            
            // Parse URL parameters
            var urlParams = new URLSearchParams(window.location.search);
            var tab = urlParams.get('tab');
            var type = urlParams.get('t');
            
            // Set page title
            var displayName = tab === 'Taiwan Province Of China' ? 'Taiwan' : tab;
            document.title = displayName + ' - Radio Player';
            $('#categoryTitle').text(displayName);
            
            // API endpoints by type
            // t=1: by country, t=2: by language, t=3: by tag
            var apiEndpoints = ['', 'json/stations/bycountry/', 'json/stations/bylanguage/', 'json/stations/bytag/'];
            
            // Load stations
            if (tab && type) {
                loadStations(tab, apiEndpoints[parseInt(type)]);
            }
            
            // Load favorites
            loadFavorites();
            
            // Toggle sidebar - toggle station list and toolbar visibility
            function toggleSidebar() {
                var sidebar = $('#sidebar');
                var toolbar = $('#top-toolbar');
                
                // Toggle sidebar
                if (window.innerWidth <= 768) {
                    sidebar.toggleClass('show-mobile');
                } else {
                    sidebar.toggleClass('collapsed');
                }
                
                // Show toolbar when sidebar is expanded, hide when collapsed
                var isExpanded = (window.innerWidth <= 768) ? sidebar.hasClass('show-mobile') : !sidebar.hasClass('collapsed');
                
                if (isExpanded) {
                    toolbar.removeClass('hidden');
                } else {
                    toolbar.addClass('hidden');
                }
            }
            
            // Toggle Sidebar button
            $('#toggleSidebar').on('click', function() {
                toggleSidebar();
            });
            
            // Menu Button - hides toolbar for immersive mode
            $('#menuBtn').on('click', function() {
                var sidebar = $('#sidebar');
                var toolbar = $('#top-toolbar');
                
                // Hide toolbar for immersive mode
                toolbar.addClass('hidden');
                
                // Collapse sidebar
                if (window.innerWidth <= 768) {
                    sidebar.removeClass('show-mobile');
                } else {
                    sidebar.addClass('collapsed');
                }
            });
            
            // Back Button
            $('#backBtn').on('click', function() {
                window.history.back();
            });
            
            // Link Input Toggle
            $('#linkBtn').on('click', function() {
                $('#linkInputWrapper').toggleClass('show');
            });
            
            // Play Custom Link
            $('#playLinkBtn').on('click', function() {
                var link = $('#linkInput').val();
                if (link) {
                    playStation(link, 'Custom URL', '');
                }
            });
            
            // Favorite Panel Toggle
            $('#favoriteBtn').on('click', function() {
                $('#favoritePanel').toggleClass('show');
            });
            
            // GitHub Button
            $('#githubBtn').on('click', function() {
                window.open('https://github.com/zhangboheng/Easy-Web-TV-M3u8', '_blank');
            });
            
            // Shuffle Play
            $('#shuffleBtn').on('click', function() {
                if (stations.length > 0) {
                    var randomIndex = Math.floor(Math.random() * stations.length);
                    var station = stations[randomIndex];
                    playStation(station.url, station.name, station.country);
                }
            });
            
            // Station Search
            $('#stationSearch').on('input', function() {
                var searchTerm = $(this).val().toLowerCase();
                $('#stationList .station-item').each(function() {
                    var name = $(this).find('.station-name').text().toLowerCase();
                    if (name.indexOf(searchTerm) > -1) {
                        $(this).show();
                    } else {
                        $(this).hide();
                    }
                });
            });
            
            // Close panels when clicking outside
            $(document).on('click', function(e) {
                if (!$(e.target).closest('#favoritePanel, #favoriteBtn').length) {
                    $('#favoritePanel').removeClass('show');
                }
                if (!$(e.target).closest('#linkInputWrapper, #linkBtn').length) {
                    $('#linkInputWrapper').removeClass('show');
                }
            });
            
            // Player events
            player.on('pause', function() {
                $('#radioVisualizer').addClass('paused');
            });
            
            player.on('play', function() {
                $('#radioVisualizer').removeClass('paused');
            });
        });
        
        // Load stations from API
        function loadStations(tab, endpoint) {
            $.ajax({
                type: "GET",
                url: radiosource[rand] + endpoint + encodeURIComponent(tab),
                success: function(data) {
                    $('#stationList').empty();
                    stations = [];
                    
                    if (data && data.length > 0) {
                        $('#stationCount').text(data.length);
                        
                        for (var i = 0; i < data.length; i++) {
                            var station = data[i];
                            stations.push({
                                url: station.url,
                                name: station.name,
                                country: station.country,
                                favicon: station.favicon
                            });
                            
                            var isFavorite = localStorage.getItem(FAV_PREFIX + station.url) === station.name;
                            var favoriteClass = isFavorite ? 'active' : '';
                            
                            var itemHtml = `
                                <div class="station-item" data-url="${station.url}" data-name="${escapeHtml(station.name)}" data-country="${escapeHtml(station.country)}">
                                    <div class="station-icon">
                                        <i class="fas fa-radio"></i>
                                    </div>
                                    <span class="station-name" title="${escapeHtml(station.name)}">${escapeHtml(station.name)}</span>
                                    <i class="fas fa-heart favorite-btn ${favoriteClass}" title="Add to favorites"></i>
                                </div>
                            `;
                            $('#stationList').append(itemHtml);
                        }
                        
                        // Auto-play first station
                        playStation(data[0].url, data[0].name, data[0].country);
                        
                        // Click handler for station items
                        $('.station-item').on('click', function(e) {
                            if ($(e.target).hasClass('favorite-btn')) {
                                // Handle favorite
                                toggleFavorite($(this).data('url'), $(this).data('name'), $(e.target));
                            } else {
                                // Play station
                                playStation($(this).data('url'), $(this).data('name'), $(this).data('country'));
                            }
                        });
                    } else {
                        $('#stationList').html(`
                            <div class="no-stations">
                                <i class="fas fa-broadcast-tower"></i>
                                <p>No stations found</p>
                            </div>
                        `);
                    }
                },
                error: function() {
                    $('#stationList').html(`
                        <div class="no-stations">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Failed to load stations. Please check your internet connection.</p>
                        </div>
                    `);
                }
            });
        }
        
        // Play station
        function playStation(url, name, country) {
            var type = url.indexOf('m3u8') > -1 ? 'application/x-mpegURL' : 'audio/mp3';
            
            player.src({
                src: url,
                type: type
            });
            player.play();
            
            // Update UI
            $('#currentStation').text(name);
            $('#stationTitle').text(name);
            if (country) {
                $('#stationCountry').html('<i class="fas fa-globe"></i><span>' + country + '</span>');
            }
            
            // Start visualizer animation
            $('#radioVisualizer').removeClass('paused');
            
            // Update active state
            $('.station-item').removeClass('active');
            $('.station-item[data-url="' + url + '"]').addClass('active');
        }
        
        // Favorite storage prefix
        var FAV_PREFIX = 'radio_fav_';
        
        // Toggle favorite
        function toggleFavorite(url, name, btn) {
            var favKey = FAV_PREFIX + url;
            var existingName = localStorage.getItem(favKey);
            
            if (existingName) {
                localStorage.removeItem(favKey);
                btn.removeClass('active');
            } else {
                localStorage.setItem(favKey, name);
                btn.addClass('active');
            }
            
            loadFavorites();
        }
        
        // Load favorites
        function loadFavorites() {
            var favorites = [];
            
            for (var i = 0; i < localStorage.length; i++) {
                var key = localStorage.key(i);
                if (key.startsWith(FAV_PREFIX)) {
                    favorites.push({
                        url: key.substring(FAV_PREFIX.length),
                        name: localStorage.getItem(key)
                    });
                }
            }
            
            $('#favCount').text(favorites.length);
            
            if (favorites.length > 0) {
                $('#favoriteContent').empty();
                
                for (var j = 0; j < favorites.length; j++) {
                    var fav = favorites[j];
                    var itemHtml = `
                        <div class="favorite-item" data-url="${fav.url}">
                            <i class="fas fa-heart"></i>
                            <span>${escapeHtml(fav.name)}</span>
                            <i class="fas fa-times delete-btn" title="Remove from favorites"></i>
                        </div>
                    `;
                    $('#favoriteContent').append(itemHtml);
                }
                
                // Click handler for favorite items (play)
                $('.favorite-item').on('click', function(e) {
                    if ($(e.target).hasClass('delete-btn')) {
                        // Delete favorite
                        var url = $(this).data('url');
                        localStorage.removeItem(FAV_PREFIX + url);
                        $(this).remove();
                        
                        // Update station list favorite icons
                        $('.station-item[data-url="' + url + '"]').find('.favorite-btn').removeClass('active');
                        
                        // Update count and check if empty
                        var remaining = $('.favorite-item').length;
                        $('#favCount').text(remaining);
                        if (remaining === 0) {
                            $('#favoriteContent').html(`
                                <div class="no-stations" style="padding: 20px;">
                                    <i class="fas fa-heart-broken" style="font-size: 24px;"></i>
                                    <span style="font-size: 12px;">No favorites yet</span>
                                </div>
                            `);
                        }
                    } else {
                        // Play station
                        playStation($(this).data('url'), $(this).find('span').text(), '');
                        $('#favoritePanel').removeClass('show');
                    }
                });
            } else {
                $('#favoriteContent').html(`
                    <div class="no-stations" style="padding: 20px;">
                        <i class="fas fa-heart-broken" style="font-size: 24px;"></i>
                        <span style="font-size: 12px;">No favorites yet</span>
                    </div>
                `);
            }
        }
        
        // Escape HTML special characters
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>

</html>
